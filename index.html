<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Tracker — INR · PHP · IDR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080b10;
      --surface: #0e1318;
      --border:  #1a2030;
      --accent:  #00e5ff;
      --accent2: #7c3aed;
      --green:   #00e676;
      --text:    #e8edf5;
      --muted:   #556070;
      --card-bg: #0d1117;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── Header ── */
    header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 40px; flex-wrap: wrap; gap: 16px;
    }
    .logo-title { font-size: 12px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
    .logo-name  { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
    .logo-name span { color: var(--accent); }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
    .last-updated { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

    .refresh-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 600; padding: 10px 20px;
      border-radius: 8px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .refresh-btn.loading { opacity: 0.6; pointer-events: none; }
    .spin { display: inline-block; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Team tabs ── */
    .team-tabs { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
    .team-tab {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      padding: 10px 24px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted); cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .team-tab:hover { border-color: var(--accent); color: var(--text); }
    .team-tab.active { background: var(--accent); border-color: var(--accent); color: #080b10; }
    .team-tab[data-team="ALL"].active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

    /* ── Stats row ── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .stat-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 24px; position: relative; overflow: hidden;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .stat-card.inr::before { background: linear-gradient(90deg, #f59e0b, #ef4444); }
    .stat-card.php::before { background: linear-gradient(90deg, #3b82f6, #06b6d4); }
    .stat-card.idr::before { background: linear-gradient(90deg, #10b981, #84cc16); }
    .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; color: var(--text); }
    .stat-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Network cards ── */
    .network-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 36px; }
    .net-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; transition: border-color 0.2s;
    }
    .net-card:hover { border-color: var(--accent); }
    .net-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .net-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .net-name { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .net-value { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; color: var(--text); }
    .net-pct { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* ── Table ── */
    .table-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
    }
    .table-title { font-size: 13px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .chain-tabs {
      display: flex; gap: 4px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; padding: 4px; flex-wrap: wrap;
    }
    .chain-tab {
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 5px; border: none; background: transparent;
      color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em;
    }
    .chain-tab.active { background: var(--border); color: var(--text); }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border);
    }
    thead th:last-child { text-align: right; }
    tbody tr { border-bottom: 1px solid rgba(26,32,48,0.6); transition: background 0.15s; animation: fadeIn 0.35s ease both; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    td { padding: 13px 14px; font-size: 13px; }

    .network-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 9px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap;
    }
    .team-badge {
      display: inline-flex; align-items: center;
      border-radius: 5px; padding: 3px 9px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .team-badge.INR { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .team-badge.PHP { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .team-badge.IDR { background: rgba(16,185,129,0.15); color: #34d399; }

    .token-badge { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; }
    .token-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; flex-shrink: 0; }
    .wallet-addr { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
    .td-balance { font-family: 'Space Mono', monospace; font-size: 12px; }
    .td-usd { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; text-align: right; color: var(--green); }
    .td-usd.zero { color: var(--muted); }

    .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 14px; color: var(--muted); }
    .state-box .pulse { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .state-box p { font-size: 13px; letter-spacing: 0.05em; }
    .error-box { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 16px 20px; color: #fca5a5; font-size: 13px; margin-bottom: 20px; }

    @media (max-width: 600px) {
      .stat-value { font-size: 18px; }
      .chain-tabs { display: none; }
      td, th { padding: 9px 8px; }
    }
  </style>
</head>

const fmtB = n => new Intl.NumberFormat('en-US',{minimumFractionDigits:2,maximumFractionDigits:6}).format(n);

async function post(url, body) {
  const r = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  return r.json();
}
async function evmCall(rpc,w,c,dec) {
  try {
    const d = "0x70a08231"+"000000000000000000000000"+w.slice(2).toLowerCase();
    const r = await post(rpc,{jsonrpc:"2.0",method:"eth_call",params:[{to:c,data:d},"latest"],id:1});
    if (r?.error) { console.warn("evmCall error:", r.error.message, c); return 0; }
    const raw = r?.result || "0x0";
    if (!raw || raw === "0x" || raw.replace(/0x0*/,"") === "") return 0;
    return parseInt(raw,16)/10**dec;
  } catch(e) { console.warn("evmCall failed:", e.message); return 0; }
}
async function evmNat(rpc,w) {
  try {
    const r = await post(rpc,{jsonrpc:"2.0",method:"eth_getBalance",params:[w,"latest"],id:1});
    if (r?.error) return 0;
    return parseInt(r.result||"0x0",16)/1e18;
  } catch { return 0; }
}

// ── FETCHERS ──────────────────────────────────────────────────────────────────
async function fetchEVM(wallet,team,prices) {
  const rows=[];
  try {
    const res = await post(ANKR,{jsonrpc:"2.0",method:"ankr_getAccountBalance",
      params:{walletAddress:wallet,onlyWhitelisted:false,nativeFirst:true},id:1});
    for (const a of res.result?.assets||[]) {
      const balance=parseFloat(a.balance||0), sym=(a.tokenSymbol||"").toUpperCase();
      let usd=parseFloat(a.balanceUsd||0);
      const net=a.blockchain?a.blockchain[0].toUpperCase()+a.blockchain.slice(1):"";
      if (!usd&&balance&&prices[sym]) usd=balance*prices[sym];
      if (balance>0&&EVM_TOKENS.has(sym)) rows.push({team,network:net,wallet,token:sym,balance,usd});
    }
  } catch(e){console.error("EVM",e);}
  return rows;
}

// Pick a working RPC once and reuse it — avoids method support mismatches across calls
let _solRpc = null;
async function getSolRpc() {
  if (_solRpc) return _solRpc;
  for (const rpc of SOL_RPCS) {
    try {
      const r = await fetch(rpc.url, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...rpc.headers },
        body: JSON.stringify({jsonrpc:"2.0",method:"getSlot",params:[],id:1})
      });
      if (!r.ok) continue;
      const d = await r.json();
      if (d?.result && !d?.error) {
        console.log("✅ Solana RPC selected:", rpc.url);
        _solRpc = rpc;
        return rpc;
      }
    } catch(e) { console.warn("SOL probe failed:", rpc.url); }
  }
  return SOL_RPCS[0]; // fallback to first
}

async function solPost(body) {
  const rpc = await getSolRpc();
  try {
    const r = await fetch(rpc.url, {
      method: "POST",
      headers: { "Content-Type": "application/json", ...rpc.headers },
      body: JSON.stringify(body)
    });
    if (!r.ok) { console.warn("SOL HTTP", r.status, rpc.url); return null; }
    const d = await r.json();
    if (d?.error) { console.warn("SOL error:", d.error.message); return null; }
    return d;
  } catch(e) { console.warn("SOL failed:", e.message); return null; }
}

async function fetchSolana(wallet, team, prices) {
  const rows = [];
  try {
    // SOL native balance
    const r1 = await solPost({jsonrpc:"2.0",method:"getBalance",params:[wallet],id:1});
    const sol = (r1?.result?.value || 0) / 1e9;
    if (sol > 0) rows.push({team, network:"Solana", wallet, token:"SOL", balance:sol, usd:sol*(prices.SOL||0)});

    // SPL tokens (USDT, USDC) — getTokenAccountsByOwner
    const r2 = await solPost({
      jsonrpc: "2.0", method: "getTokenAccountsByOwner", id: 2,
      params: [
        wallet,
        { programId: "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA" },
        { encoding: "jsonParsed" }
      ]
    });
    for (const a of r2?.result?.value || []) {
      try {
        const info = a.account.data.parsed.info;
        const amt  = parseFloat(info.tokenAmount.uiAmount || 0);
        const sym  = SOL_MINTS[info.mint];
        if (sym && amt > 0) rows.push({team, network:"Solana", wallet, token:sym, balance:amt, usd:amt});
      } catch {}
    }
  } catch(e) { console.error("SOL", wallet.slice(0,8), e); }
  return rows;
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function tronFetchWithRetry(url, opts={}, retries=3, delayMs=6000) {
  for (let i=0; i<retries; i++) {
    try {
      const r = await fetch(url, opts);
      const d = await r.json();
      // Check for rate limit error in response body
      if (d?.Error?.includes?.("rate") || d?.error?.includes?.("rate") || d?.message?.includes?.("forbidden")) {
        console.warn(`TRON rate limited, waiting ${delayMs}ms...`);
        await sleep(delayMs);
        continue;
      }
      return d;
    } catch(e) {
      if (i < retries-1) await sleep(delayMs);
    }
  }
  return null;
}

async function fetchTron(wallet,team,prices) {
  const rows=[];
  try {
    await sleep(300);
    // Fetch account — includes TRX balance AND trc20 token balances in one call
    const acct = await tronFetchWithRetry(`${TRON}/v1/accounts/${wallet}`);
    const data  = acct?.data?.[0];
    if (!data) return rows;

    // Native TRX
    const trx = parseFloat(data.balance||0)/1e6;
    if (trx>0) rows.push({team,network:"Tron",wallet,token:"TRX",balance:trx,usd:trx*(prices.TRX||0)});

    // TRC-20 tokens are returned in data.trc20 as array of {contractAddress: balance} objects
    const trc20List = data.trc20 || [];
    // Build reverse lookup: contract → [symbol, decimals]
    const CONTRACT_MAP = {};
    for (const [c,[sym,dec]] of Object.entries(TRON_TOKENS)) CONTRACT_MAP[c] = [sym,dec];

    for (const tokenObj of trc20List) {
      for (const [contractAddr, rawBal] of Object.entries(tokenObj)) {
        const entry = CONTRACT_MAP[contractAddr];
        if (!entry) continue;
        const [sym, dec] = entry;
        const bal = parseInt(rawBal||"0") / 10**dec;
        if (bal>0) rows.push({team,network:"Tron",wallet,token:sym,balance:bal,usd:bal});
      }
    }
  } catch(e){console.error("TRON",wallet.slice(0,8),e);}
  return rows;
}

async function fetchTon(wallet,team,prices) {
  const rows=[];
  try {
    // Native TON balance
    const balRes = await fetch(`${TON_API}/getAddressBalance?address=${encodeURIComponent(wallet)}`);
    if (balRes.ok) {
      const ton = parseFloat((await balRes.json()).result||0)/1e9;
      if (ton>0) rows.push({team,network:"TON",wallet,token:"TON",balance:ton,usd:ton*(prices.TON||0)});
    }

    // Jettons — fetch ALL at once, use decimals FROM the API response (not hardcoded)
    try {
      const jRes = await fetch(`https://tonapi.io/v2/accounts/${encodeURIComponent(wallet)}/jettons`);
      if (jRes.ok) {
        const jData = await jRes.json();
        for (const j of jData.balances||[]) {
          // Match by symbol name — most reliable across address format differences
          const sym = (j.jetton?.symbol||"").toUpperCase();
          if (sym !== "USDT" && sym !== "USDC") continue;

          // Use decimals from the API — do NOT hardcode 6
          const dec = parseInt(j.jetton?.decimals ?? 6);
          const raw = j.balance || "0";

          // tonapi returns balance as string of raw units
          const bal = parseInt(raw) / 10**dec;
          console.log(`TON ${sym}: raw=${raw} decimals=${dec} bal=${bal} wallet=${wallet.slice(0,12)}`);
          if (bal > 0) rows.push({team, network:"TON", wallet, token:sym, balance:bal, usd:bal});
        }
      }
    } catch(e){ console.warn("TON jettons failed:", e.message); }
  } catch(e){console.error("TON",wallet.slice(0,8),e);}
  return rows;
}

async function fetchRonin(wallet,team,prices) {
  const rows=[];
  try {
    // Native RON balance via RPC
    const ron = await evmNat(RONIN, wallet);
    if (ron>0) rows.push({team,network:"Ronin",wallet,token:"RON",balance:ron,usd:ron*(prices.RON||0)});

    // Token balances — use Ronin Explorer API (returns all tokens at once, no contract guessing)
    try {
      const addr = wallet.toLowerCase();
      const res = await fetch(`https://explorer.roninchain.com/api/tokenbalances/${addr}`);
      if (res.ok) {
        const data = await res.json();
        const items = data.results || data.items || data || [];
        for (const item of items) {
          const sym = (item.token_symbol || item.symbol || "").toUpperCase();
          if (sym !== "USDC" && sym !== "USDT") continue;
          const dec = parseInt(item.token_decimals ?? item.decimals ?? 6);
          const raw = item.balance || item.value || "0";
          const bal = parseInt(raw) / 10**dec;
          console.log(`Ronin ${sym}: raw=${raw} dec=${dec} bal=${bal} wallet=${wallet.slice(0,8)}`);
          if (bal>0) rows.push({team,network:"Ronin",wallet,token:sym,balance:bal,usd:bal});
        }
        return rows; // success — skip RPC fallback
      }
    } catch(e) { console.warn("Ronin explorer API failed:", e.message); }

    // Fallback: raw RPC calls for each known contract
    for (const [c,[sym,dec]] of Object.entries(RONIN_TOKENS)) {
      try {
        const bal = await evmCall(RONIN, wallet, c, dec);
        console.log(`Ronin RPC ${sym} (${c.slice(0,8)}): ${bal}`);
        if (bal>0) rows.push({team,network:"Ronin",wallet,token:sym,balance:bal,usd:bal});
      } catch(e) { console.warn(`Ronin RPC ${sym} error:`, e.message); }
    }
  } catch(e){console.error("Ronin",wallet.slice(0,8),e);}
  return rows;
}

async function fetchAptos(wallet,team,prices) {
  const rows=[];
  try {
    const r=await fetch(`${APTOS}/accounts/${wallet}/balance/0x1::aptos_coin::AptosCoin`);
    if(r.ok){
      const apt=parseFloat((await r.json()).amount||0)/1e8;
      if(apt>0) rows.push({team,network:"Aptos",wallet,token:"APT",balance:apt,usd:apt*(prices.APT||0)});
    }
    for(const[m,[sym,dec]] of Object.entries(APTOS_TOKENS)) {
      try {
        const r2=await fetch(`${APTOS}/accounts/${wallet}/balance/${m}`);
        if(r2.ok){const bal=parseFloat((await r2.json()).amount||0)/10**dec;if(bal>0) rows.push({team,network:"Aptos",wallet,token:sym,balance:bal,usd:bal});}
      } catch{}
    }
  } catch(e){console.error("Aptos",e);}
  return rows;
}

function setStatus(msg) {
  document.getElementById("tableContainer").innerHTML=
    `<div class="state-box"><div class="pulse"></div><p>${msg}</p></div>`;
}

async function fetchAll(prices) {
  const all=[];

  // ── Step 1: EVM (Ankr) — sequential per team to respect rate limits ──
  setStatus("Fetching EVM chains (BSC, ETH, Polygon, Arbitrum, Base)…");
  for(const[team,w] of Object.entries(TEAMS)) {
    const evmSeen=new Set();
    for(const k of ["bsc","polygon","eth","arb","base"]) {
      if(w[k]&&!evmSeen.has(w[k].toLowerCase())) {
        evmSeen.add(w[k].toLowerCase());
        const rows = await fetchEVM(w[k],team,prices);
        all.push(...rows);
        await sleep(400); // stagger Ankr calls
      }
    }
  }

  // ── Step 2: Solana — parallel, no rate issues ──
  setStatus("Fetching Solana…");
  const solJobs=[];
  for(const[team,w] of Object.entries(TEAMS)) if(w.solana) solJobs.push(fetchSolana(w.solana,team,prices));
  for(const r of await Promise.allSettled(solJobs)) if(r.status==="fulfilled") all.push(...r.value);

  // ── Step 3: TRON — sequential to avoid rate limit ──
  setStatus("Fetching TRON (sequential to avoid rate limit)…");
  for(const[team,w] of Object.entries(TEAMS)) {
    if(w.tron) {
      const rows = await fetchTron(w.tron,team,prices);
      all.push(...rows);
      await sleep(1500); // wait between each TRON wallet
    }
  }

  // ── Step 4: TON — parallel ──
  setStatus("Fetching TON…");
  const tonJobs=[];
  for(const[team,w] of Object.entries(TEAMS)) if(w.ton) tonJobs.push(fetchTon(w.ton,team,prices));
  for(const r of await Promise.allSettled(tonJobs)) if(r.status==="fulfilled") all.push(...r.value);

  // ── Step 5: Ronin — parallel ──
  setStatus("Fetching Ronin…");
  const roninJobs=[];
  for(const[team,w] of Object.entries(TEAMS)) if(w.ronin) roninJobs.push(fetchRonin(w.ronin,team,prices));
  for(const r of await Promise.allSettled(roninJobs)) if(r.status==="fulfilled") all.push(...r.value);

  // ── Step 6: Aptos — parallel ──
  setStatus("Fetching Aptos…");
  const aptosJobs=[];
  for(const[team,w] of Object.entries(TEAMS)) if(w.aptos) aptosJobs.push(fetchAptos(w.aptos,team,prices));
  for(const r of await Promise.allSettled(aptosJobs)) if(r.status==="fulfilled") all.push(...r.value);

  return all;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let allRows=[], activeTeam="ALL", activeChain="All";

const visible = () => {
  let r=allRows;
  if(activeTeam!=="ALL") r=r.filter(x=>x.team===activeTeam);
  if(activeChain!=="All") r=r.filter(x=>x.network===activeChain);
  return r;
};

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderStats() {
  const totals={INR:0,PHP:0,IDR:0};
  for(const r of allRows) totals[r.team]+=r.usd;
  const grand=Object.values(totals).reduce((a,b)=>a+b,0);
  document.getElementById("statsRow").innerHTML=`
    <div class="stat-card">
      <div class="stat-label">Total Portfolio</div>
      <div class="stat-value">$${fmt(grand)}</div>
      <div class="stat-sub">All teams · All chains</div>
    </div>
    ${Object.entries(totals).map(([t,v])=>`
    <div class="stat-card ${t.toLowerCase()}">
      <div class="stat-label">${t} Wallets</div>
      <div class="stat-value">$${fmt(v)}</div>
      <div class="stat-sub">${grand>0?((v/grand)*100).toFixed(1):"0.0"}% of portfolio</div>
    </div>`).join("")}`;
}

function renderNetworkCards() {
  const src=activeTeam==="ALL"?allRows:allRows.filter(r=>r.team===activeTeam);
  const nets={};
  for(const r of src) nets[r.network]=(nets[r.network]||0)+r.usd;
  const grand=Object.values(nets).reduce((a,b)=>a+b,0);
  document.getElementById("networkGrid").innerHTML=Object.entries(nets).sort((a,b)=>b[1]-a[1]).map(([n,v])=>`
    <div class="net-card">
      <div class="net-card-top"><span class="net-dot" style="background:${NET_CLR[n]||"#556070"}"></span><span class="net-name">${n}</span></div>
      <div class="net-value">$${fmt(v)}</div>
      <div class="net-pct">${grand>0?((v/grand)*100).toFixed(1):"0.0"}% of view</div>
    </div>`).join("");
}

function renderTable() {
  const src=activeTeam==="ALL"?allRows:allRows.filter(r=>r.team===activeTeam);
  const chains=["All",...new Set(src.map(r=>r.network))];
  document.getElementById("chainTabs").innerHTML=chains.map(c=>
    `<button class="chain-tab ${c===activeChain?"active":""}" onclick="setChain('${c}')">${c}</button>`).join("");

  const rows=visible();
  if(!rows.length){document.getElementById("tableContainer").innerHTML=`<div class="state-box"><p>No holdings found.</p></div>`;return;}

  document.getElementById("tableContainer").innerHTML=`
    <table>
      <thead><tr><th>Team</th><th>Network</th><th>Wallet</th><th>Token</th><th>Balance</th><th>USD Value</th></tr></thead>
      <tbody>${rows.map((r,i)=>`
        <tr style="animation-delay:${i*18}ms">
          <td><span class="team-badge ${r.team}">${r.team}</span></td>
          <td><span class="network-badge"><span style="width:5px;height:5px;border-radius:50%;background:${NET_CLR[r.network]||"#556070"};display:inline-block"></span>${r.network}</span></td>
          <td><span class="wallet-addr">${shrt(r.wallet)}</span></td>
          <td><span class="token-badge"><span class="token-icon" style="background:${TOKEN_CLR[r.token]||"#556070"}22;color:${TOKEN_CLR[r.token]||"#556070"}">${r.token.slice(0,2)}</span>${r.token}</span></td>
          <td class="td-balance">${fmtB(r.balance)}</td>
          <td class="${r.usd<0.01?"td-usd zero":"td-usd"}">$${fmt(r.usd)}</td>
        </tr>`).join("")}</tbody>
    </table>`;
}

function setTeam(team) {
  activeTeam=team; activeChain="All";
  document.querySelectorAll(".team-tab").forEach(b=>b.classList.toggle("active",b.dataset.team===team));
  renderNetworkCards(); renderTable();
}
function setChain(chain) {
  activeChain=chain;
  document.querySelectorAll(".chain-tab").forEach(b=>b.classList.toggle("active",b.textContent===chain));
  renderTable();
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadData() {
  const btn=document.getElementById("refreshBtn"), icon=document.getElementById("refreshIcon");
  btn.classList.add("loading"); icon.classList.add("spin");
  document.getElementById("errorBox").style.display="none";
  document.getElementById("tableContainer").innerHTML=`<div class="state-box"><div class="pulse"></div><p>Fetching prices…</p></div>`;

  try {
    const prices=await getPrices();
    allRows=await fetchAll(prices);
    renderStats(); renderNetworkCards(); renderTable();
    document.getElementById("lastUpdated").textContent="Updated "+new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById("errorBox").style.display="block";
    document.getElementById("errorBox").textContent="Error: "+e.message;
  } finally {
    btn.classList.remove("loading"); icon.classList.remove("spin"); icon.textContent="↻";
  }
}

loadData();
</script>
