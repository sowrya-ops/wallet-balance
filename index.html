<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080b10;
      --surface:  #0e1318;
      --border:   #1a2030;
      --accent:   #00e5ff;
      --accent2:  #7c3aed;
      --green:    #00e676;
      --text:     #e8edf5;
      --muted:    #556070;
      --card-bg:  #0d1117;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 48px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
    }

    .logo-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .logo-name {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .logo-name span { color: var(--accent); }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .last-updated {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .refresh-btn.loading { opacity: 0.6; pointer-events: none; }

    .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Grand Total Card ── */
    .grand-total {
      background: linear-gradient(135deg, #0d1117 0%, #111827 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 36px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }

    .grand-total::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .grand-total-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .grand-total-value {
      font-family: 'Space Mono', monospace;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }

    .grand-total-value .currency { font-size: 24px; color: var(--muted); margin-right: 4px; }

    /* ── Summary Cards Row ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    .summary-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      transition: border-color 0.2s;
    }

    .summary-card:hover { border-color: var(--accent); }

    .summary-card-network {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .network-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .summary-card-network-name {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .summary-card-value {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .summary-card-pct {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Table ── */
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .table-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .filter-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }

    .filter-tab {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    .filter-tab.active { background: var(--border); color: var(--text); }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    thead th:last-child { text-align: right; }

    tbody tr {
      border-bottom: 1px solid rgba(26,32,48,0.6);
      transition: background 0.15s;
      animation: fadeIn 0.4s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    tbody tr:hover { background: rgba(255,255,255,0.02); }

    td {
      padding: 14px 16px;
      font-size: 14px;
    }

    .td-network {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .network-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .token-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 13px;
    }

    .token-icon {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .wallet-addr {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .td-balance {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--text);
    }

    .td-usd {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-align: right;
      color: var(--green);
    }

    .td-usd.zero { color: var(--muted); }

    /* ── Loading / Error states ── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 16px;
      color: var(--muted);
    }

    .state-box .pulse {
      width: 40px; height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .state-box p { font-size: 14px; letter-spacing: 0.05em; }

    .error-box {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px;
      padding: 20px 24px;
      color: #fca5a5;
      font-size: 13px;
      margin-bottom: 24px;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .grand-total-value { font-size: 32px; }
      .filter-tabs { display: none; }
      td, th { padding: 10px 10px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-title">Multi-Chain</div>
      <div class="logo-name">Portfolio<span>.</span></div>
    </div>
    <div class="header-right">
      <div class="last-updated" id="lastUpdated">—</div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
        <span id="refreshIcon">↻</span> Refresh
      </button>
    </div>
  </header>

  <!-- Grand Total -->
  <div class="grand-total">
    <div class="grand-total-label">Total Portfolio Value</div>
    <div class="grand-total-value" id="grandTotal">
      <span class="currency">$</span><span id="grandTotalNum">—</span>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="summary-grid" id="summaryGrid"></div>

  <!-- Error box -->
  <div class="error-box" id="errorBox" style="display:none"></div>

  <!-- Table -->
  <div class="table-header">
    <div class="table-title">Holdings</div>
    <div class="filter-tabs" id="filterTabs"></div>
  </div>

  <div id="tableContainer">
    <div class="state-box"><div class="pulse"></div><p>Loading portfolio...</p></div>
  </div>

</div>

<script>
// ── CONFIG — edit wallets & tokens here ──────────────────────────────────────
const CONFIG = {
  ankrEndpoint: "https://rpc.ankr.com/multichain/08e12b8200893486cd2fc46d238429d1056f7a9d85676c2332a92652fe1f698a",
  solanaRpc:    "https://api.mainnet-beta.solana.com",
  tronApi:      "https://api.trongrid.io",
  tonApi:       "https://toncenter.com/api/v2",
  roninRpc:     "https://api.roninchain.com/rpc",

  wallets: {
    evm:    "0x77bd55C93c8935CEF5382d5aDf309e57edA117dA",
    solana: "9xsVcpVCYvqE66DT1AtjBRz5BWgGoN26WUaQaCPCZaEj",
    tron:   "TLYxeTkzAAK7xFUsw6FuriF3tWHvmEbCG2",
    ton:    "UQApBiD7Jy4eOH0kdpyDrumWgt_rC0WJ61eszRh_nCCo3HQ4",
    ronin:  "0x43a43d7aaf2c8a78e40607d8ff2606a7dcd0fe18",
  },

  evmTokens: new Set(["USDT","USDC","ETH","BNB","MATIC","AVAX","FTM","ARB","POL","SOL"]),

  solMints: {
    "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v": "USDC",
    "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB": "USDT",
  },

  tronTokens: {
    "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t": ["USDT", 6],
    "TEkxiTehnzSmSe2XqrBj4w32RUN966rdz8":  ["USDC", 6],
  },

  tonJettons: {
    "EQCxE6mUtQJKFnGfaROTKOt1lZbDiiX1kCixRv7Nw2Id_sDs": ["USDT", 6],
    "EQB-MPwrd1G6WKNkLz_VnV6WqBDd142KMQv-g1O-8QUA3728": ["USDC", 6],
  },

  roninTokens: {
    "0x0b7007c13325c48911f73a2dad5fa5dcbf808adc": ["USDC", 6],
    "0x96f2842007021a4c5f06bcc72961701d66ff8465": ["USDT", 6],
    "0x97a9107c1793bc407d6f527b77e7fff4d812bece": ["AXS",  18],
  },
};

// ── Network styles ────────────────────────────────────────────────────────────
const NETWORK_STYLE = {
  "Ethereum":  { color: "#627eea", emoji: "⟠" },
  "Bsc":       { color: "#f0b90b", emoji: "⬡" },
  "Polygon":   { color: "#8247e5", emoji: "⬡" },
  "Arbitrum":  { color: "#28a0f0", emoji: "◈" },
  "Optimism":  { color: "#ff0420", emoji: "◎" },
  "Avalanche": { color: "#e84142", emoji: "▲" },
  "Base":      { color: "#0052ff", emoji: "●" },
  "Fantom":    { color: "#1969ff", emoji: "◈" },
  "Solana":    { color: "#9945ff", emoji: "◎" },
  "Tron":      { color: "#ef0027", emoji: "◈" },
  "TON":       { color: "#0098ea", emoji: "◎" },
  "Ronin":     { color: "#00e5ff", emoji: "⬡" },
};

const TOKEN_COLORS = {
  ETH: "#627eea", BNB: "#f0b90b", USDT: "#26a17b", USDC: "#2775ca",
  SOL: "#9945ff", TRX: "#ef0027", TON: "#0098ea", RON: "#00e5ff",
  AXS: "#f0b90b", ARB: "#28a0f0", AVAX: "#e84142", MATIC: "#8247e5",
  POL: "#8247e5", FTM: "#1969ff",
};

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmt  = n => new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
const fmtB = n => new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 6 }).format(n);

async function rpcPost(url, body) {
  const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  return r.json();
}

async function balanceOf(rpc, wallet, contract, decimals) {
  try {
    const padded = "000000000000000000000000" + wallet.slice(2);
    const data   = "0x70a08231" + padded;
    const res    = await rpcPost(rpc, { jsonrpc:"2.0", method:"eth_call", params:[{to:contract,data},"latest"], id:1 });
    const raw    = res.result || "0x0";
    return parseInt(raw, 16) / Math.pow(10, decimals);
  } catch { return 0; }
}

async function nativeBalance(rpc, wallet) {
  try {
    const res = await rpcPost(rpc, { jsonrpc:"2.0", method:"eth_getBalance", params:[wallet,"latest"], id:1 });
    return parseInt(res.result || "0x0", 16) / 1e18;
  } catch { return 0; }
}

// ── Price fetcher ─────────────────────────────────────────────────────────────
async function getPrices() {
  try {
    const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=solana,tron,the-open-network,matic-network,avalanche-2,fantom,arbitrum,ronin,axie-infinity&vs_currencies=usd");
    const d = await r.json();
    return {
      SOL:   d.solana?.usd           || 0,
      TRX:   d.tron?.usd             || 0,
      TON:   d["the-open-network"]?.usd || 0,
      MATIC: d["matic-network"]?.usd || 0,
      POL:   d["matic-network"]?.usd || 0,
      AVAX:  d["avalanche-2"]?.usd   || 0,
      FTM:   d.fantom?.usd           || 0,
      ARB:   d.arbitrum?.usd         || 0,
      RON:   d.ronin?.usd            || 0,
      AXS:   d["axie-infinity"]?.usd || 0,
    };
  } catch { return {}; }
}

// ── Chain fetchers ────────────────────────────────────────────────────────────
async function fetchEVM(prices) {
  const rows = [];
  try {
    const res = await rpcPost(CONFIG.ankrEndpoint, {
      jsonrpc:"2.0", method:"ankr_getAccountBalance",
      params:{ walletAddress: CONFIG.wallets.evm, onlyWhitelisted:false, nativeFirst:true }, id:1
    });
    for (const a of res.result?.assets || []) {
      const balance = parseFloat(a.balance || 0);
      let   usd     = parseFloat(a.balanceUsd || 0);
      const symbol  = (a.tokenSymbol || "").toUpperCase();
      if (usd === 0 && balance > 0 && prices[symbol]) usd = balance * prices[symbol];
      if (balance > 0 && CONFIG.evmTokens.has(symbol)) {
        rows.push({ network: a.blockchain.charAt(0).toUpperCase() + a.blockchain.slice(1), wallet: CONFIG.wallets.evm, token: symbol, balance, usd });
      }
    }
  } catch(e) { console.error("EVM error", e); }
  return rows;
}

async function fetchSolana(prices) {
  const rows = [];
  try {
    const r1 = await rpcPost(CONFIG.solanaRpc, { jsonrpc:"2.0", method:"getBalance", params:[CONFIG.wallets.solana], id:1 });
    const sol = (r1.result?.value || 0) / 1e9;
    if (sol > 0) rows.push({ network:"Solana", wallet:CONFIG.wallets.solana, token:"SOL", balance:sol, usd:sol*(prices.SOL||0) });

    const r2 = await rpcPost(CONFIG.solanaRpc, {
      jsonrpc:"2.0", method:"getTokenAccountsByOwner",
      params:[CONFIG.wallets.solana, {programId:"TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"}, {encoding:"jsonParsed"}], id:1
    });
    for (const acc of r2.result?.value || []) {
      const info   = acc.account.data.parsed.info;
      const amount = parseFloat(info.tokenAmount.uiAmount || 0);
      const sym    = CONFIG.solMints[info.mint];
      if (sym && amount > 0) rows.push({ network:"Solana", wallet:CONFIG.wallets.solana, token:sym, balance:amount, usd:amount });
    }
  } catch(e) { console.error("Solana error", e); }
  return rows;
}

async function fetchTron(prices) {
  const rows = [];
  try {
    const r = await fetch(`${CONFIG.tronApi}/v1/accounts/${CONFIG.wallets.tron}`);
    const d = await r.json();
    const trx = parseFloat(d.data?.[0]?.balance || 0) / 1e6;
    if (trx > 0) rows.push({ network:"Tron", wallet:CONFIG.wallets.tron, token:"TRX", balance:trx, usd:trx*(prices.TRX||0) });

    for (const [contract, [symbol, decimals]] of Object.entries(CONFIG.tronTokens)) {
      // Use trongrid triggersmartcontract endpoint
      const wallet = CONFIG.wallets.tron;
      const r2 = await fetch(`${CONFIG.tronApi}/wallet/triggerconstantcontract`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contract_address:contract, function_selector:"balanceOf(address)", parameter:wallet.padStart(64,'0'), owner_address:wallet, visible:true })
      });
      const d2 = await r2.json();
      const hex = d2.constant_result?.[0] || "0";
      const bal = parseInt(hex, 16) / Math.pow(10, decimals);
      if (bal > 0) rows.push({ network:"Tron", wallet:CONFIG.wallets.tron, token:symbol, balance:bal, usd:bal });
    }
  } catch(e) { console.error("Tron error", e); }
  return rows;
}

async function fetchTON(prices) {
  const rows = [];
  try {
    const r = await fetch(`${CONFIG.tonApi}/getAddressBalance?address=${encodeURIComponent(CONFIG.wallets.ton)}`);
    const d = await r.json();
    const ton = parseFloat(d.result || 0) / 1e9;
    if (ton > 0) rows.push({ network:"TON", wallet:CONFIG.wallets.ton, token:"TON", balance:ton, usd:ton*(prices.TON||0) });

    for (const [master, [symbol, decimals]] of Object.entries(CONFIG.tonJettons)) {
      try {
        const r2 = await fetch(`https://tonapi.io/v2/accounts/${CONFIG.wallets.ton}/jettons/${master}`);
        const d2 = await r2.json();
        const bal = parseFloat(d2.balance || 0) / Math.pow(10, decimals);
        if (bal > 0) rows.push({ network:"TON", wallet:CONFIG.wallets.ton, token:symbol, balance:bal, usd:bal });
      } catch {}
    }
  } catch(e) { console.error("TON error", e); }
  return rows;
}

async function fetchRonin(prices) {
  const rows = [];
  try {
    const ron = await nativeBalance(CONFIG.roninRpc, CONFIG.wallets.ronin);
    if (ron > 0) rows.push({ network:"Ronin", wallet:CONFIG.wallets.ronin, token:"RON", balance:ron, usd:ron*(prices.RON||0) });

    for (const [contract, [symbol, decimals]] of Object.entries(CONFIG.roninTokens)) {
      const bal = await balanceOf(CONFIG.roninRpc, CONFIG.wallets.ronin, contract, decimals);
      if (bal > 0) {
        const usd = ["USDC","USDT"].includes(symbol) ? bal : bal * (prices[symbol] || 0);
        rows.push({ network:"Ronin", wallet:CONFIG.wallets.ronin, token:symbol, balance:bal, usd });
      }
    }
  } catch(e) { console.error("Ronin error", e); }
  return rows;
}

// ── Render ────────────────────────────────────────────────────────────────────
let allRows = [];
let activeFilter = "All";

function renderTable(rows) {
  const filtered = activeFilter === "All" ? rows : rows.filter(r => r.network === activeFilter);

  if (filtered.length === 0) {
    document.getElementById("tableContainer").innerHTML =
      `<div class="state-box"><p>No holdings found.</p></div>`;
    return;
  }

  const tbody = filtered.map((r, i) => {
    const ns   = NETWORK_STYLE[r.network] || { color:"#556070", emoji:"●" };
    const tc   = TOKEN_COLORS[r.token] || "#556070";
    const usdClass = r.usd < 0.01 ? "td-usd zero" : "td-usd";
    const short = w => w.length > 20 ? w.slice(0,6)+"..."+w.slice(-4) : w;
    const delay = `animation-delay:${i*30}ms`;
    return `
      <tr style="${delay}">
        <td>
          <span class="network-badge">
            <span style="width:6px;height:6px;border-radius:50%;background:${ns.color};display:inline-block;flex-shrink:0"></span>
            ${r.network}
          </span>
        </td>
        <td><span class="wallet-addr">${short(r.wallet)}</span></td>
        <td>
          <span class="token-badge">
            <span class="token-icon" style="background:${tc}22;color:${tc}">${r.token.slice(0,2)}</span>
            ${r.token}
          </span>
        </td>
        <td class="td-balance">${fmtB(r.balance)}</td>
        <td class="${usdClass}">$${fmt(r.usd)}</td>
      </tr>`;
  }).join("");

  document.getElementById("tableContainer").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Network</th>
          <th>Wallet</th>
          <th>Token</th>
          <th>Balance</th>
          <th>USD Value</th>
        </tr>
      </thead>
      <tbody>${tbody}</tbody>
    </table>`;
}

function renderSummary(rows) {
  const totals = {};
  for (const r of rows) totals[r.network] = (totals[r.network] || 0) + r.usd;
  const grand = Object.values(totals).reduce((a,b)=>a+b, 0);

  document.getElementById("grandTotalNum").textContent = fmt(grand);

  const grid = document.getElementById("summaryGrid");
  grid.innerHTML = Object.entries(totals).map(([net, total]) => {
    const ns  = NETWORK_STYLE[net] || { color:"#556070" };
    const pct = grand > 0 ? ((total/grand)*100).toFixed(1) : "0.0";
    return `
      <div class="summary-card">
        <div class="summary-card-network">
          <span class="network-dot" style="background:${ns.color}"></span>
          <span class="summary-card-network-name">${net}</span>
        </div>
        <div class="summary-card-value">$${fmt(total)}</div>
        <div class="summary-card-pct">${pct}% of portfolio</div>
      </div>`;
  }).join("");

  // Filter tabs
  const networks = ["All", ...Object.keys(totals)];
  document.getElementById("filterTabs").innerHTML = networks.map(n =>
    `<button class="filter-tab ${n===activeFilter?'active':''}" onclick="setFilter('${n}')">${n}</button>`
  ).join("");
}

function setFilter(net) {
  activeFilter = net;
  document.querySelectorAll(".filter-tab").forEach(b => b.classList.toggle("active", b.textContent===net));
  renderTable(allRows);
}

// ── Main load ─────────────────────────────────────────────────────────────────
async function loadData() {
  const btn  = document.getElementById("refreshBtn");
  const icon = document.getElementById("refreshIcon");
  btn.classList.add("loading");
  icon.classList.add("spin");
  icon.textContent = "↻";
  document.getElementById("errorBox").style.display = "none";

  try {
    const prices = await getPrices();
    const [evm, sol, tron, ton, ronin] = await Promise.all([
      fetchEVM(prices),
      fetchSolana(prices),
      fetchTron(prices),
      fetchTON(prices),
      fetchRonin(prices),
    ]);

    allRows = [...evm, ...sol, ...tron, ...ton, ...ronin];
    renderSummary(allRows);
    renderTable(allRows);

    document.getElementById("lastUpdated").textContent =
      "Updated " + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById("errorBox").style.display = "block";
    document.getElementById("errorBox").textContent = "Error loading data: " + e.message;
  } finally {
    btn.classList.remove("loading");
    icon.classList.remove("spin");
    icon.textContent = "↻";
  }
}

loadData();
</script>
</body>
</html>
